<!DOCTYPE html>
<meta charset="utf-8">
<title>美妆护肤店门头设计AI ·古月AI智能体</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#FDF6FB,#F5EFF7);
}
.header{
  background:linear-gradient(90deg,#E786A7,#B983FF,#FFC2DC);
  color:#fff;
  text-align:center;
  padding:50px 20px;
}
.container{
  max-width:800px;
  margin:30px auto;
  background:#fff;
  padding:40px;
  border-radius:20px;
}
.input-box{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:20px;
}
.btn{
  width:100%;
  padding:15px;
  background:linear-gradient(90deg,#E786A7,#B983FF);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.result{max-width:800px;margin:30px auto;}
.item{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}
.copy-btn{
  background:#E786A7;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}
.copy-btn.copied{
  background:#ccc;
  color:#666;
}
</style>

<div class="header">
  <h1>💄 美妆门头AI · 强随机生成版</h1>
  <p>已优化：结构随机 / 内容不重复 / 商业级输出</p>
</div>

<div class="container">
  <input id="input" class="input-box" placeholder="输入：品牌名+风格+材质">
  <button class="btn" onclick="go()">🔥 生成10组爆款方案</button>
</div>

<div class="result" id="result"></div>

<script>

// ====== 随机函数 ======
function 随机(arr){
  return arr[Math.floor(Math.random()*arr.length)]
}

// ====== 配置库（全部拆散） ======
const 配置 = {
  核心风格:[
    "轻奢网红风","高端美妆空间","女性打卡门头","精致护肤品牌门头","高级感商业门头"
  ],
  材质:[
    "亚克力发光字+铝塑板",
    "不锈钢围边字+玻璃底板",
    "软膜灯箱结构",
    "玫瑰金不锈钢+UV板",
    "镜面不锈钢+大理石纹"
  ],
  质感:[
    "高级光泽","精致细腻","轻奢质感","通透视觉","品牌质感强烈"
  ],
  字体:[
    "优雅圆体","轻奢细体","高级无衬线字体","女性柔美字体"
  ],
  色彩:[
    "粉色+玫瑰金","紫色渐变","白金轻奢","粉紫色系","高级暖粉色"
  ],
  光影:[
    "白天自然光","光线柔和均匀","突出材质反光","层次清晰"
  ],
  结构:[
    "正立面完整展示","门头覆盖整铺","落地玻璃门","LOGO居中布局"
  ],
  固定:"商业街独立门头，非摊位，非临时结构"
}

// ====== 多模板结构 ======
const 模板库 = [

(c)=>`${c.核心风格}，${c.需求}，采用${c.材质}，呈现${c.质感}效果，字体为${c.字体}，整体色彩以${c.色彩}为主，${c.光影}，${c.结构}，${c.固定}`,

(c)=>`${c.需求}门头设计，主打${c.核心风格}，选用${c.材质}，强调${c.色彩}视觉冲击，搭配${c.字体}，整体呈现${c.质感}，${c.结构}，${c.光影}，${c.固定}`,

(c)=>`围绕${c.需求}打造门头，风格定位${c.核心风格}，材质组合为${c.材质}，突出${c.质感}与${c.色彩}，字体设计为${c.字体}，${c.结构}，${c.光影}，${c.固定}`,

(c)=>`${c.核心风格}风格门头，适用于${c.需求}，通过${c.材质}实现高级感，配合${c.色彩}体系与${c.字体}设计，强化视觉识别，${c.结构}，${c.光影}，${c.固定}`

]

// ====== 生成单条 ======
function 生成单条(需求){
  let c = {
    核心风格:随机(配置.核心风格),
    材质:随机(配置.材质),
    质感:随机(配置.质感),
    字体:随机(配置.字体),
    色彩:随机(配置.色彩),
    光影:随机(配置.光影),
    结构:随机(配置.结构),
    固定:配置.固定,
    需求:需求
  }
  return 随机(模板库)(c)
}

// ====== 去重生成 ======
function 生成10组(需求){
  let set = new Set()
  while(set.size < 10){
    set.add(生成单条(需求))
  }
  return Array.from(set)
}

// ====== 复制 ======
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add("copied")
  })
}

// ====== 主逻辑 ======
function go(){
  let val=document.getElementById("input").value.trim()
  if(!val){alert("请输入需求");return}
  
  let list=生成10组(val)
  let html=""
  
  list.forEach((item,i)=>{
    html+=`
    <div class="item">
      <div>${i+1}. ${item}</div>
      <button class="copy-btn" onclick="copyText('${item.replace(/'/g,"")} ',this)">复制</button>
    </div>`
  })
  
  document.getElementById("result").innerHTML=html
}

</script>
